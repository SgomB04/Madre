<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Mamá ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffd6e0,#ffe9c7);
      overflow:hidden;
      padding:20px;
      position:relative;
    }

    /* Tarjeta adaptable */
    .card{
      width:min(95vw, 500px);
      background:rgba(255,255,255,0.18);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.3);
      border-radius:clamp(20px,4vw,30px);
      padding:clamp(18px,4vw,30px);
      text-align:center;
      box-shadow:0 10px 35px rgba(0,0,0,0.2);
      animation:fadeIn 1.5s ease;
    }

    /* Imagen responsive */
    .photo{
      width:100%;
      border-radius:20px;
      overflow:hidden;
      margin-bottom:20px;
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
    }

    .photo img{
      width:100%;
      height:auto;
      display:block;
      object-fit:cover;
    }

    /* Texto adaptable */
    h1{
      color:#fff;
      font-size:clamp(1.7rem, 5vw, 2.5rem);
      margin-bottom:15px;
      text-shadow:0 2px 10px rgba(0,0,0,0.25);
    }

    p{
      color:#fff;
      font-size:clamp(1rem, 3vw, 1.3rem);
      line-height:1.8;
      text-shadow:0 2px 8px rgba(0,0,0,0.25);
      padding:0 5px;
    }

    .heart{
      margin-top:20px;
      font-size:clamp(1.8rem, 5vw, 2.5rem);
      animation:heartbeat 1.5s infinite;
    }

    @keyframes heartbeat{
      0%{transform:scale(1);}
      25%{transform:scale(1.15);}
      50%{transform:scale(1);}
      75%{transform:scale(1.15);}
      100%{transform:scale(1);}
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Corazones flotando */
    .bg-hearts{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:-1;
    }

    .bg-hearts span{
      position:absolute;
      display:block;
      color:rgba(255,255,255,0.4);
      font-size:clamp(18px,3vw,28px);
      animation:float linear infinite;
      bottom:-50px;
    }

    @keyframes float{
      0%{
        transform:translateY(0) scale(0);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
      }
    }

    /* Ajustes extra para pantallas muy pequeñas */
    @media (max-width:480px){

      body{
        padding:15px;
      }

      .card{
        width:100%;
        padding:18px;
      }

      p{
        line-height:1.6;
      }
    }

  </style>
</head>

<body>

  <div class="bg-hearts">
    <span style="left:10%; animation-duration:8s;">❤</span>
    <span style="left:30%; animation-duration:12s;">❤</span>
    <span style="left:50%; animation-duration:10s;">❤</span>
    <span style="left:70%; animation-duration:14s;">❤</span>
    <span style="left:90%; animation-duration:9s;">❤</span>
  </div>

  <div class="card">

    <div class="photo">
      <img src="Dulce_mom.JPG" alt="Mamá">
    </div>

    <h1>Para ti, mami ❤️</h1>

    <p>
      “Te amamos, mami.<br>
      Gracias por ser padre y madre a la vez.”
    </p>

    <div class="heart">💖</div>

  </div>

</body>
</html>
